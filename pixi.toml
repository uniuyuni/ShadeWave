[workspace]
authors = ["uniuyuni <uniuyuni@gmail.com>"]
channels = ["conda-forge"]
name = "platypus"
platforms = ["osx-arm64"]
version = "0.1.0"

[activation]
scripts = ["scripts/pixi_env_libraw.sh"]

[tasks]
# PyInstaller で macOS .app を生成。現在の pixi 環境のパッケージを参照
build-macos-app = { cmd = "python scripts/build_macos_app_pyinstaller.py" }
# GitHub から最新 LibRaw を取得して .pixi/libraw-install にビルドします
build-libraw = { cmd = "bash scripts/build_libraw_from_external.sh" }
# 拡張モジュールのみ再ビルド（ローカル LibRaw は .pixi/libraw-install を参照）
install-libraw-enhanced = { cmd = "CC=/usr/bin/clang CXX=/usr/bin/clang++ python -m pip --disable-pip-version-check install -e external/libraw_enhanced --no-build-isolation --force-reinstall --no-deps --no-cache-dir" }
install-sam3 = { cmd = "python -m pip install -e external/SAM3" }
# 初回: LibRaw を取得してビルド → editable インストール（毎回フルビルドしたい場合はこちら）
setup-libraw-enhanced = { cmd = "bash -c 'set -euo pipefail; bash scripts/build_libraw_from_external.sh && CC=/usr/bin/clang CXX=/usr/bin/clang++ python -m pip --disable-pip-version-check install -e external/libraw_enhanced --no-build-isolation --force-reinstall --no-deps --no-cache-dir'" }
test-hls-color-adjust = { cmd = "python tests/test_hls_color_adjust.py" }
check-exr-export-env = { cmd = "python scripts/check_exr_export_env.py" }
build-denoise-native = """
PYBIND11_DIR="$(python -m pybind11 --cmakedir)" && \
cmake -G Ninja -S external/radiance_denoise/native -B external/radiance_denoise/native/build -DCMAKE_BUILD_TYPE=Release -Dpybind11_DIR="$PYBIND11_DIR" -DPYBIND11_FINDPYTHON=ON && \
cmake --build external/radiance_denoise/native/build && \
python -c 'from radiance_denoise.native import HAVE_NATIVE; assert HAVE_NATIVE, "radiance_denoise native extension was not built"'
"""
install-effect-backends = { cmd = "CC=/usr/bin/clang CXX=/usr/bin/clang++ python -m pip --disable-pip-version-check install -e effect_backends --no-build-isolation --force-reinstall --no-deps --no-cache-dir" }
# radiance_denoise を未取得なら clone し、ネイティブ拡張をビルドして配置（初回セットアップ用）
setup-denoise = { cmd = "bash scripts/setup_radiance_denoise.sh" }

[dependencies]
autoconf = ">=2.71,<3"
automake = ">=1.16,<2"
curl = ">=8.17.0,<9"
git = ">=2.51.0,<3"
gdown = ">=5.2.1,<6"
libtool = ">=2.4,<3"
pip = ">=25.0.1,<26"
pkg-config = ">=0.29,<1"
wget = ">=1.21,<2"
python = ">=3.11.13,<3.12"
llvm-openmp = ">=22.1.3,<23"
py-spy = ">=0.4.2,<0.5"
cmake = "*"
ninja = "*"
cxx-compiler = "*"
pybind11 = "*"
libvips = ">=8.17.2,<9"
