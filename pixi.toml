[workspace]
authors = ["uniuyuni <uniuyuni@gmail.com>"]
channels = ["conda-forge"]
name = "platypus"
platforms = ["osx-arm64"]
version = "0.1.0"

[activation]
scripts = ["scripts/pixi_env_libraw.sh"]

[tasks]
# PyInstaller で macOS .app を生成（要: pip install pyinstaller）。現在の pixi 環境のパッケージを参照
build-macos-app = { cmd = "python scripts/build_macos_app_pyinstaller.py" }
# external/LibRaw-master を autotools で third_party/libraw-install にビルド（pixi の autoconf/automake/libtool を使用）
build-libraw = { cmd = "bash scripts/build_libraw_from_external.sh" }
# 拡張モジュールのみ再ビルド（LibRaw は既に third_party にある想定）
install-libraw-enhanced = { cmd = "python -m pip install -e libraw_enhanced --no-build-isolation" }
install-sam3 = { cmd = "python -m pip install -e SAM3" }
# 初回: LibRaw ビルド → editable インストール（毎回フルビルドしたい場合はこちら）
setup-libraw-enhanced = { cmd = "bash -c 'set -euo pipefail; bash scripts/build_libraw_from_external.sh && python -m pip install -e libraw_enhanced --no-build-isolation'" }
test-hls-color-adjust = { cmd = "python tests/test_hls_color_adjust.py" }
check-exr-export-env = { cmd = "python scripts/check_exr_export_env.py" }
build-denoise-native = """
cmake -G Ninja -S radiance_denoise/native -B radiance_denoise/native/build -DCMAKE_BUILD_TYPE=Release && \
cmake --build radiance_denoise/native/build
"""
# radiance_denoise を未取得なら clone し、ネイティブ拡張をビルドして配置（初回セットアップ用）
setup-denoise = { cmd = "bash scripts/setup_radiance_denoise.sh" }

[dependencies]
autoconf = ">=2.71,<3"
automake = ">=1.16,<2"
curl = ">=8.17.0,<9"
git = ">=2.51.0,<3"
gdown = ">=5.2.1,<6"
libtool = ">=2.4,<3"
libvips = ">=8.17.2,<9"
pip = ">=25.0.1,<26"
pkg-config = ">=0.29,<1"
python = ">=3.11.13,<3.12"
llvm-openmp = ">=22.1.3,<23"
py-spy = ">=0.4.2,<0.5"
cmake = "*"
ninja = "*"
cxx-compiler = "*"
pybind11 = "*"

[pypi-dependencies]
radiance_denoise = { path = "radiance_denoise", editable = true }
webcolors = ">=25.10.0, <26"
llama-cpp-python = ">=0.3.28, <0.4"
